<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Máš Filipa?</title>
  <meta name="description" content="Praktické tipy a rady z praxe. Manažment, kariéra, rozhodnutia — z pohľadu niekoho, kto tým prešiel.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://masfilipa.sk/blog/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal: #0B3C49; --gold: #D4AF37;
      --text: #1a1a2e; --text-light: #5a5a72;
      --border: #dde6ea; --off-white: #F8FAFB;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; color: var(--text); background: #fff; }

    nav { background: var(--teal); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    nav a.logo { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 18px; color: #fff; text-decoration: none; }
    nav a.logo span { color: var(--gold); }
    nav a.home { font-size: 13px; color: rgba(255,255,255,0.7); text-decoration: none; }
    nav a.home:hover { color: var(--gold); }

    .hero { background: var(--off-white); padding: 64px 24px 48px; text-align: center; border-bottom: 1px solid var(--border); }
    .hero .label { font-family: 'Poppins', sans-serif; font-size: 11px; font-weight: 700; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; }
    .hero h1 { font-family: 'Poppins', sans-serif; font-size: clamp(28px, 4vw, 42px); font-weight: 700; color: var(--teal); margin-bottom: 14px; }
    .hero p { font-size: 16px; color: var(--text-light); max-width: 480px; margin: 0 auto; }

    .posts-wrap { max-width: 800px; margin: 0 auto; padding: 52px 24px 80px; }
    .post-card { display: block; text-decoration: none; padding: 28px; border: 1.5px solid var(--border); border-radius: 12px; margin-bottom: 18px; transition: box-shadow .2s, border-color .2s; }
    .post-card:hover { box-shadow: 0 6px 24px rgba(11,60,73,0.09); border-color: var(--teal); }
    .post-date { font-size: 12px; color: var(--text-light); margin-bottom: 8px; }
    .post-title { font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 700; color: var(--teal); margin-bottom: 8px; line-height: 1.3; }
    .post-ebook { display: inline-block; font-size: 11px; font-weight: 600; color: var(--gold); background: #fdf8e7; padding: 3px 10px; border-radius: 20px; font-family: 'Poppins', sans-serif; }
    .post-arrow { float: right; color: var(--teal); font-size: 18px; margin-top: -24px; }

    .empty { text-align: center; color: var(--text-light); padding: 60px 24px; }
    .empty p { font-size: 15px; margin-bottom: 8px; }

    footer { background: var(--teal); color: rgba(255,255,255,0.5); text-align: center; padding: 24px; font-size: 13px; }
    footer a { color: var(--gold); text-decoration: none; }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="https://masfilipa.sk">Máš <span>Filipa?</span></a>
  <a class="home" href="https://masfilipa.sk">← Domov</a>
</nav>

<div class="hero">
  <div class="label">Blog</div>
  <h1>Rady z praxe</h1>
  <p>Krátke články o manažmente, kariére a rozhodnutiach. Bez teórie — len to, čo reálne funguje.</p>
</div>

<div class="posts-wrap" id="postsList">
  <div class="empty"><p>Načítavam články...</p></div>
</div>

<footer>
  © 2025 Filip &nbsp;·&nbsp; <a href="https://masfilipa.sk">masfilipa.sk</a>
</footer>

<script>
fetch('/blog/posts.json')
  .then(r => r.json())
  .then(posts => {
    const wrap = document.getElementById('postsList');
    if (!posts || posts.length === 0) {
      wrap.innerHTML = '<div class="empty"><p>Zatiaľ žiadne články.</p><p>Čoskoro pribudnú.</p></div>';
      return;
    }
    wrap.innerHTML = posts.map(p => `
      <a class="post-card" href="/blog/${p.slug}.html">
        <div class="post-date">${p.date}</div>
        <div class="post-title">${p.title}</div>
        <span class="post-ebook">${p.ebook}</span>
        <span class="post-arrow">→</span>
      </a>
    `).join('');
  })
  .catch(() => {
    document.getElementById('postsList').innerHTML =
      '<div class="empty"><p>Články sa momentálne nenačítali.</p></div>';
  });
</script>
</body>
</html>
